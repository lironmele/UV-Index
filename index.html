<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ea5e9">
    <title>UV Index ☀️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #eef2f7;
            --bg-app-2: #e3ecf5;
            --bg-surface: #ffffff;
            --bg-surface-2: #f6f8fb;
            --bg-elevated: rgba(255, 255, 255, 0.72);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --border-strong: #cbd5e1;
            --accent: #0ea5e9;
            --accent-2: #6366f1;
            --accent-soft: rgba(14, 165, 233, 0.12);
            --error-color: #dc2626;
            --error-bg: #fef2f2;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
            --shadow: 0 10px 30px -12px rgba(15, 23, 42, 0.22);
            --shadow-lg: 0 24px 60px -20px rgba(15, 23, 42, 0.28);
            --radius: 18px;
            --radius-sm: 12px;
            --sky-top: #0ea5e9;
            --sky-bottom: #38bdf8;
        }

        .dark {
            --bg-app: #0b1120;
            --bg-app-2: #0f172a;
            --bg-surface: #131c2e;
            --bg-surface-2: #0f1828;
            --bg-elevated: rgba(19, 28, 46, 0.72);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #233047;
            --border-strong: #324054;
            --accent: #38bdf8;
            --accent-2: #818cf8;
            --accent-soft: rgba(56, 189, 248, 0.16);
            --error-color: #f87171;
            --error-bg: #2a1717;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
            --shadow: 0 16px 40px -16px rgba(0, 0, 0, 0.7);
            --shadow-lg: 0 30px 70px -24px rgba(0, 0, 0, 0.8);
            --sky-top: #1e3a5f;
            --sky-bottom: #0f2236;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background:
                radial-gradient(1200px 600px at 100% -10%, var(--accent-soft), transparent 60%),
                linear-gradient(180deg, var(--bg-app) 0%, var(--bg-app-2) 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0 0 60px;
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== Hero header ===== */
        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 0 0 32px 32px;
            background:
                radial-gradient(900px 400px at 85% -40%, rgba(255, 255, 255, 0.35), transparent 60%),
                linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
            box-shadow: var(--shadow);
            transition: background 0.6s ease;
            margin-bottom: 26px;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: -60px;
            left: 8%;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, #fde68a 0%, #fbbf24 55%, rgba(251, 191, 36, 0) 72%);
            filter: blur(2px);
            opacity: 0.9;
            pointer-events: none;
        }

        .hero-inner {
            position: relative;
            z-index: 1;
            max-width: 1240px;
            margin: 0 auto;
            padding: 26px 20px 30px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .hero-title-wrap { display: flex; flex-direction: column; gap: 4px; }

        .hero h1 {
            font-size: clamp(1.8em, 5vw, 2.6em);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dark .hero h1 { color: #f0f9ff; }

        .hero-subtitle {
            font-size: 1em;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.92);
        }
        .dark .hero-subtitle { color: #cfedfd; }

        .hero-updated {
            margin-top: 8px;
            font-size: 0.82em;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.88);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .dark .hero-updated { color: #a5dbf7; }

        .hero-actions { display: flex; gap: 8px; align-items: center; }

        .icon-button {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            font-size: 1.35em;
            cursor: pointer;
            border-radius: 14px;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            color: #0c4a6e;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 46px;
            width: 46px;
            line-height: 1;
            box-shadow: var(--shadow-sm);
        }
        .dark .icon-button {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            color: #e0f2fe;
        }
        .icon-button:hover { transform: translateY(-2px) scale(1.04); background: rgba(255, 255, 255, 0.7); }
        .dark .icon-button:hover { background: rgba(255, 255, 255, 0.16); }
        .icon-button:active { transform: scale(0.94); }

        /* ===== Controls toolbar ===== */
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 0 -20px 22px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 900;
            padding: 12px 20px;
            background: var(--bg-app);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 6px 16px -10px rgba(15, 23, 42, 0.35);
        }

        .search-bar {
            position: relative;
            flex: 1;
            min-width: 220px;
        }

        .search-bar .search-icon {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1em;
            pointer-events: none;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 46px 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            font-size: 1em;
            font-family: inherit;
            background: var(--bg-surface);
            color: var(--text-primary);
            outline: none;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background-color 0.3s ease;
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        .date-control { position: relative; }

        .date-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 18px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s ease, transform 0.2s ease;
            white-space: nowrap;
        }
        .date-pill:hover { border-color: var(--border-strong); transform: translateY(-1px); }
        .date-pill .chev { font-size: 0.7em; color: var(--text-muted); }

        .date-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 8px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            min-width: 220px;
            max-height: 320px;
            overflow-y: auto;
            display: none;
        }
        .date-dropdown.show { display: block; animation: pop 0.16s ease; }

        @keyframes pop {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .date-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
            padding: 11px 14px;
            border: none;
            background: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            text-align: right;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .date-option:hover { background: var(--bg-surface-2); color: var(--text-primary); }
        .date-option.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
        .date-option .badge-today {
            font-size: 0.75em;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--accent);
            color: #fff;
        }

        /* ===== States ===== */
        .loading {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 1.1em;
            margin: 60px 0;
        }
        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            background: var(--error-bg);
            color: var(--error-color);
            padding: 20px;
            border-radius: var(--radius-sm);
            margin: 20px 0;
            text-align: center;
            font-size: 1.05em;
            border: 1px solid var(--error-color);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }
        .empty-state .emoji { font-size: 3em; display: block; margin-bottom: 12px; }
        .empty-state h3 { color: var(--text-secondary); font-weight: 600; margin-bottom: 6px; }

        /* ===== Section label ===== */
        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            margin: 4px 4px 12px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* ===== Locations grid ===== */
        .locations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 18px;
        }
        .locations-grid + .section-label { margin-top: 30px; }

        .location-card {
            background: var(--bg-surface);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.35s ease both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .location-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--border-strong);
        }
        .location-card.pinned {
            border-color: color-mix(in srgb, #ef4444 35%, var(--border-color));
        }
        .location-card.pinned::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #fb7185, #ef4444);
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
        }
        .location-name {
            font-size: 1.25em;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .pin-button {
            background: none;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            padding: 6px;
            border-radius: 10px;
            transition: transform 0.25s ease, background 0.2s ease;
            line-height: 1;
            flex-shrink: 0;
        }
        .pin-button:hover { background: var(--bg-surface-2); transform: scale(1.15); }
        .pin-button:active { transform: scale(0.9); }
        .pin-button.animate { animation: heartBeat 0.6s ease; }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.35); }
            50% { transform: scale(1); }
            75% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        /* ===== Card summary (peak + now) ===== */
        .card-summary {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .summary-tile {
            flex: 1;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            background: var(--bg-surface-2);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .summary-tile.is-peak {
            color: #fff;
            border: none;
        }
        .summary-label {
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.85;
        }
        .summary-tile:not(.is-peak) .summary-label { color: var(--text-muted); }
        .summary-value {
            font-size: 1.7em;
            font-weight: 800;
            line-height: 1.1;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .summary-level { font-size: 0.62em; font-weight: 700; opacity: 0.92; }
        .summary-tile.is-now .summary-value { color: var(--text-primary); }
        .summary-tile.is-now .summary-sub { font-size: 0.72em; font-weight: 600; color: var(--text-muted); }

        /* ===== Hourly strip ===== */
        .uv-strip-label {
            font-size: 0.74em;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }
        .uv-section {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
            margin: 0 -4px;
            padding-inline: 4px;
        }
        .uv-section::-webkit-scrollbar { height: 6px; }
        .uv-section::-webkit-scrollbar-track { background: transparent; }
        .uv-section::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

        .uv-strip {
            display: flex;
            gap: 6px;
            direction: ltr;
            min-width: max-content;
        }
        .uv-hour {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        .uv-hour-time {
            font-size: 0.72em;
            font-weight: 600;
            color: var(--text-muted);
        }
        .uv-cell {
            width: 38px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1em;
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: transform 0.15s ease;
        }
        .dark .uv-cell { border-color: rgba(255, 255, 255, 0.08); }
        .uv-cell:hover { transform: translateY(-2px); }
        .uv-hour.now .uv-cell {
            box-shadow: 0 0 0 2px var(--bg-surface), 0 0 0 4px var(--accent);
        }
        .uv-hour.now .uv-hour-time { color: var(--accent); font-weight: 800; }

        /* UV color scale */
        .uv-0 { background: #a7f3d0; color: #065f46; }
        .uv-1 { background: #6ee7b7; color: #064e3b; }
        .uv-2 { background: #fde68a; color: #713f12; }
        .uv-3 { background: #fcd34d; color: #78350f; }
        .uv-4 { background: #fbbf24; color: #7c2d12; }
        .uv-5 { background: #fb923c; color: #7c2d12; }
        .uv-6 { background: #f97316; color: #ffffff; }
        .uv-7 { background: #f43f5e; color: #ffffff; }
        .uv-8 { background: #ef4444; color: #ffffff; }
        .uv-9 { background: #dc2626; color: #ffffff; }
        .uv-10 { background: #b91c1c; color: #ffffff; }
        .uv-11 { background: #a21caf; color: #ffffff; }
        .uv-12 { background: #6b21a8; color: #ffffff; box-shadow: 0 0 12px rgba(168, 85, 247, 0.5); }

        .no-uv-data {
            color: var(--text-tertiary);
            font-style: italic;
            font-size: 0.92em;
            padding: 14px;
            text-align: center;
            background: var(--bg-surface-2);
            border-radius: var(--radius-sm);
        }

        @media (max-width: 520px) {
            .toolbar { gap: 10px; }
            .date-pill { padding: 13px 14px; }
            .locations-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-inner">
            <div class="hero-title-wrap">
                <h1><span>UV Index</span> <span>☀️</span></h1>
                <span class="hero-subtitle">מדד הקרינה היומי בישראל</span>
                <span id="hero-updated" class="hero-updated" style="display:none;"></span>
            </div>
            <div class="hero-actions">
                <button id="dark-mode-toggle" class="icon-button" title="מצב כהה / בהיר" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            ...טוען מיקומים
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="toolbar" class="toolbar" style="display: none;">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="חיפוש מיקום...">
            </div>
            <div class="date-control">
                <button id="date-pill" class="date-pill">
                    <span>📅</span>
                    <span id="date-pill-label">בחר תאריך</span>
                    <span class="chev">▾</span>
                </button>
                <div id="date-dropdown" class="date-dropdown"></div>
            </div>
        </div>

        <div id="locations-wrap"></div>
    </div>

    <script>
        let locationsData = {};
        let uvData = {};
        let availableDates = [];
        let selectedDate = '';
        let searchQuery = '';

        const UV_LEVELS = [
            { max: 2,  label: 'נמוך',     en: 'Low',       cls: 'uv-2'  },
            { max: 5,  label: 'בינוני',   en: 'Moderate',  cls: 'uv-4'  },
            { max: 7,  label: 'גבוה',     en: 'High',      cls: 'uv-6'  },
            { max: 10, label: 'גבוה מאוד', en: 'Very High', cls: 'uv-9'  },
            { max: 99, label: 'קיצוני',   en: 'Extreme',   cls: 'uv-11' }
        ];

        function getUVClass(value) {
            const uv = Math.min(parseInt(value) || 0, 12);
            return `uv-${uv}`;
        }

        function getUVLevel(value) {
            const uv = parseInt(value) || 0;
            return UV_LEVELS.find(l => uv <= l.max) || UV_LEVELS[UV_LEVELS.length - 1];
        }

        /* ===== Time-of-day sky gradient for the hero ===== */
        function applySkyGradient() {
            const hour = new Date().getHours();
            const isDark = document.documentElement.classList.contains('dark');
            let top, bottom;
            if (hour < 6)        { top = isDark ? '#16233d' : '#2c3e60'; bottom = isDark ? '#0c1626' : '#46577a'; }
            else if (hour < 9)   { top = isDark ? '#2a3a5c' : '#f59e42'; bottom = isDark ? '#3d2f4a' : '#fb7185'; }
            else if (hour < 16)  { top = isDark ? '#1e3a5f' : '#0ea5e9'; bottom = isDark ? '#0f2236' : '#38bdf8'; }
            else if (hour < 19)  { top = isDark ? '#3a2b4a' : '#fb7185'; bottom = isDark ? '#2a1f38' : '#f97316'; }
            else                 { top = isDark ? '#16233d' : '#3b4d70'; bottom = isDark ? '#0c1626' : '#586a90'; }
            document.documentElement.style.setProperty('--sky-top', top);
            document.documentElement.style.setProperty('--sky-bottom', bottom);
        }

        /* ===== Dark mode ===== */
        function initDarkMode() {
            const toggle = document.getElementById('dark-mode-toggle');
            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                toggle.textContent = '☀️';
            } else {
                toggle.textContent = '🌙';
            }
            applySkyGradient();
            toggle.addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('darkMode', isDark);
                toggle.textContent = isDark ? '☀️' : '🌙';
                applySkyGradient();
            });
            setInterval(applySkyGradient, 30 * 60 * 1000);
        }

        /* ===== Fuzzy search ===== */
        function fuzzyMatch(pattern, text) {
            pattern = pattern.toLowerCase();
            text = text.toLowerCase();
            if (text === pattern) return 1000;
            if (text.startsWith(pattern)) return 500;
            if (text.includes(pattern)) return 200;
            let pi = 0, consec = 0, maxConsec = 0;
            for (let i = 0; i < text.length && pi < pattern.length; i++) {
                if (text[i] === pattern[pi]) { consec++; maxConsec = Math.max(maxConsec, consec); pi++; }
                else { consec = 0; }
            }
            if (pi === pattern.length) return 50 + maxConsec * 10;
            let matched = 0;
            const chars = new Set(text);
            for (const c of pattern) if (chars.has(c)) matched++;
            if (matched >= Math.ceil(pattern.length * 0.6)) return 10 + matched;
            return 0;
        }

        /* ===== Pins ===== */
        function getPinnedLocations() {
            const pinned = localStorage.getItem('pinnedLocations');
            return pinned ? JSON.parse(pinned) : [];
        }
        function savePinnedLocations(pinned) {
            localStorage.setItem('pinnedLocations', JSON.stringify(pinned));
        }
        function togglePin(locationId, event) {
            if (event && event.currentTarget) {
                const btn = event.currentTarget;
                btn.classList.add('animate');
                setTimeout(() => btn.classList.remove('animate'), 600);
            }
            let pinned = getPinnedLocations();
            const i = pinned.indexOf(locationId);
            if (i > -1) pinned.splice(i, 1); else pinned.push(locationId);
            savePinnedLocations(pinned);
            displayLocations();
        }

        /* ===== Date helpers ===== */
        function isToday(dateStr) {
            const d = new Date(dateStr); d.setHours(0, 0, 0, 0);
            const t = new Date(); t.setHours(0, 0, 0, 0);
            return d.getTime() === t.getTime();
        }
        function formatDateLabel(dateStr) {
            const d = new Date(dateStr);
            const opts = { weekday: 'short', day: 'numeric', month: 'short' };
            try { return d.toLocaleDateString('he-IL', opts); } catch (e) { return dateStr; }
        }
        function formatUpdated(iso) {
            try {
                const d = new Date(iso);
                return d.toLocaleString('he-IL', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return iso; }
        }

        /* ===== Render date dropdown ===== */
        function renderDateDropdown() {
            const dd = document.getElementById('date-dropdown');
            dd.innerHTML = availableDates.map(date => {
                const today = isToday(date);
                const active = date === selectedDate;
                return `<button class="date-option ${active ? 'active' : ''}" data-date="${date}">
                    <span>${formatDateLabel(date)}</span>
                    ${today ? '<span class="badge-today">היום</span>' : ''}
                </button>`;
            }).join('');
            dd.querySelectorAll('.date-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedDate = btn.dataset.date;
                    updateDatePillLabel();
                    renderDateDropdown();
                    displayLocations();
                    dd.classList.remove('show');
                });
            });
        }
        function updateDatePillLabel() {
            const label = document.getElementById('date-pill-label');
            label.textContent = (isToday(selectedDate) ? 'היום · ' : '') + formatDateLabel(selectedDate);
        }

        async function fetchData() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');

            try {
                const res = await fetch(`data/uv-index.json?t=${Date.now()}`);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const data = await res.json();

                loadingEl.style.display = 'none';
                errorEl.style.display = 'none';

                if (!data.locations) throw new Error('No locations data received');
                if (!data.uv) throw new Error('No UV data received');

                locationsData = data.locations;
                uvData = data.uv;

                if (data.updatedAt) {
                    const hu = document.getElementById('hero-updated');
                    hu.textContent = '🕓 עודכן: ' + formatUpdated(data.updatedAt);
                    hu.style.display = 'inline-flex';
                }

                const datesSet = new Set();
                Object.values(uvData).forEach(loc => Object.keys(loc).forEach(d => datesSet.add(d)));
                availableDates = Array.from(datesSet).sort();
                selectedDate = availableDates.find(isToday) || availableDates[0] || '';

                if (availableDates.length > 0) {
                    document.getElementById('toolbar').style.display = 'flex';
                    renderDateDropdown();
                    updateDatePillLabel();
                }

                displayLocations();
                setupControls();
            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = `שגיאה בטעינת נתונים: ${error.message}`;
                console.error('Error fetching data:', error);
            }
        }

        function setupControls() {
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                displayLocations();
            });
            // On mobile, scroll the sticky toolbar to the top on focus so results
            // appear directly under the search box rather than below the keyboard.
            searchInput.addEventListener('focus', () => {
                requestAnimationFrame(() => {
                    document.getElementById('toolbar').scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });

            const datePill = document.getElementById('date-pill');
            const dropdown = document.getElementById('date-dropdown');
            datePill.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.date-control')) dropdown.classList.remove('show');
            });
        }

        function buildHourlyStrip(dateUV, showNow) {
            const hours = Object.keys(dateUV).sort((a, b) => parseInt(a) - parseInt(b));
            const currentHour = new Date().getHours();
            const cells = hours.map(h => {
                const value = dateUV[h];
                const level = getUVLevel(value);
                const isNow = showNow && parseInt(h) === currentHour;
                return `<div class="uv-hour ${isNow ? 'now' : ''}">
                    <span class="uv-hour-time">${h}:00</span>
                    <div class="uv-cell ${getUVClass(value)}" title="${level.label} (${level.en})">${value}</div>
                </div>`;
            }).join('');
            return `<div class="uv-strip-label">תחזית שעתית</div>
                    <div class="uv-section"><div class="uv-strip">${cells}</div></div>`;
        }

        function buildSummary(dateUV, showNow) {
            const entries = Object.entries(dateUV);
            let peakHour = null, peakVal = -1;
            for (const [h, v] of entries) {
                const n = parseInt(v) || 0;
                if (n > peakVal) { peakVal = n; peakHour = h; }
            }
            const peakLevel = getUVLevel(peakVal);
            const peakTile = `<div class="summary-tile is-peak ${getUVClass(peakVal)}">
                <span class="summary-label">שיא היום · ${peakHour}:00</span>
                <span class="summary-value">${peakVal}<span class="summary-level">${peakLevel.label}</span></span>
            </div>`;

            // Only show a second tile when there's a distinct "now" reading
            // (i.e. when viewing today). Otherwise the peak tile stands alone
            // so the daily peak isn't displayed twice.
            let nowTile = '';
            const currentHour = String(new Date().getHours());
            if (showNow && dateUV[currentHour] != null) {
                const nv = dateUV[currentHour];
                const nl = getUVLevel(nv);
                nowTile = `<div class="summary-tile is-now">
                    <span class="summary-label">עכשיו (${currentHour}:00)</span>
                    <span class="summary-value">${nv}<span class="summary-level" style="color:var(--text-tertiary)">${nl.label}</span></span>
                </div>`;
            }
            return `<div class="card-summary">${peakTile}${nowTile}</div>`;
        }

        function getSortedLocations(pinned) {
            let locations = Object.values(locationsData);
            if (searchQuery) {
                return locations.map(loc => ({
                    location: loc,
                    score: fuzzyMatch(searchQuery, loc.name),
                    pinned: pinned.includes(loc.lid)
                })).filter(x => x.score > 0)
                  .sort((a, b) => {
                      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
                      if (b.score !== a.score) return b.score - a.score;
                      return a.location.name.localeCompare(b.location.name);
                  })
                  .map(x => x.location);
            }
            return locations.sort((a, b) => {
                const ap = pinned.includes(a.lid), bp = pinned.includes(b.lid);
                if (ap !== bp) return ap ? -1 : 1;
                return a.name.localeCompare(b.name);
            });
        }

        function cardHTML(location, pinned) {
            const showNow = isToday(selectedDate);
            const locationUV = uvData[location.lid];
            const dateUV = locationUV && locationUV[selectedDate] ? locationUV[selectedDate] : null;
            const isPinned = pinned.includes(location.lid);

            let body;
            if (dateUV && Object.keys(dateUV).length) {
                body = buildSummary(dateUV, showNow) + buildHourlyStrip(dateUV, showNow);
            } else {
                body = `<div class="no-uv-data">אין נתוני UV זמינים עבור ${formatDateLabel(selectedDate)}</div>`;
            }

            return `<div class="location-card ${isPinned ? 'pinned' : ''}">
                <div class="card-head">
                    <span class="location-name">${location.name}</span>
                    <button class="pin-button" onclick="togglePin('${location.lid}', event)"
                        title="${isPinned ? 'הסר מהמועדפים' : 'הוסף למועדפים'}">
                        ${isPinned ? '❤️' : '🤍'}
                    </button>
                </div>
                ${body}
            </div>`;
        }

        function displayLocations() {
            const wrap = document.getElementById('locations-wrap');
            const pinned = getPinnedLocations();
            const locations = getSortedLocations(pinned);

            if (!locations.length) {
                wrap.innerHTML = `<div class="empty-state">
                    <span class="emoji">🔍</span>
                    <h3>לא נמצאו מיקומים</h3>
                    <p>נסה חיפוש אחר</p>
                </div>`;
                return;
            }

            if (searchQuery) {
                wrap.innerHTML = `<div class="locations-grid">${locations.map(l => cardHTML(l, pinned)).join('')}</div>`;
                return;
            }

            const pinnedLocs = locations.filter(l => pinned.includes(l.lid));
            const otherLocs = locations.filter(l => !pinned.includes(l.lid));
            let html = '';
            if (pinnedLocs.length) {
                html += `<div class="section-label">❤️ מועדפים</div>
                         <div class="locations-grid">${pinnedLocs.map(l => cardHTML(l, pinned)).join('')}</div>`;
            }
            if (otherLocs.length) {
                html += `<div class="section-label">📍 כל המיקומים</div>
                         <div class="locations-grid">${otherLocs.map(l => cardHTML(l, pinned)).join('')}</div>`;
            }
            wrap.innerHTML = html;
        }

        initDarkMode();
        fetchData();
    </script>
</body>
</html>
