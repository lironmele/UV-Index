<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV Index☀️</title>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --text-primary: #212529;
            --text-secondary: #495057;
            --text-tertiary: #6c757d;
            --text-muted: #adb5bd;
            --border-color: #dee2e6;
            --border-color-hover: #ced4da;
            --border-color-focus: #667eea;
            --error-color: #dc3545;
            --error-bg: #fff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --time-hue-overlay: transparent;
            --header-glow: transparent;
        }

        .dark {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-tertiary: #b0b0b0;
            --text-muted: #808080;
            --border-color: #3a3a3a;
            --border-color-hover: #4a4a4a;
            --border-color-focus: #667eea;
            --error-color: #ff6b6b;
            --error-bg: #2a1f1f;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            --time-hue-overlay: transparent;
            --header-glow: transparent;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--time-hue-overlay);
            pointer-events: none;
            z-index: 0;
            transition: background 0.5s ease;
            mix-blend-mode: overlay;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
            padding: 15px 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--header-glow) 0%, var(--bg-secondary) 40%, var(--bg-secondary) 60%, var(--header-glow) 100%);
            transition: background 0.5s ease;
            border: 1px solid var(--border-color);
        }

        h1 {
            color: var(--text-secondary);
            text-align: center;
            margin: 0;
            font-size: 2.5em;
            font-weight: 600;
            flex: 1;
        }

        .date-icon-button,
        .dark-mode-toggle {
            background: none;
            border: none;
            font-size: 1.8em;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            width: 44px;
            line-height: 1;
        }

        .date-icon-button:hover,
        .dark-mode-toggle:hover {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            transform: scale(1.1);
        }

        .date-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            box-shadow: var(--shadow);
            z-index: 1000;
            min-width: 200px;
            display: none;
        }

        .date-dropdown.show {
            display: block;
        }

        .date-dropdown select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            outline: none;
            font-weight: 500;
            transition: border-color 0.3s ease;
        }

        .date-dropdown select:focus {
            border-color: var(--border-color-focus);
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .loading {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 1.2em;
            margin: 40px 0;
        }

        .error {
            background: var(--error-bg);
            color: var(--error-color);
            padding: 20px;
            border-radius: 6px;
            margin: 20px 0;
            text-align: center;
            font-size: 1.1em;
            border: 1px solid var(--error-color);
        }

        .locations-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .location-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s ease, background-color 0.3s ease;
        }

        .location-card:hover {
            border-color: var(--border-color-hover);
        }

        .location-name {
            font-size: 1.5em;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            text-align: right;
            direction: rtl;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .location-name-text {
            flex: 1;
        }

        .pin-button {
            background: none;
            border: none;
            font-size: 1.3em;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            transition: all 0.3s ease;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .pin-button:hover {
            background: var(--bg-tertiary);
            color: #dc3545;
            transform: scale(1.1);
        }

        .pin-button.pinned {
            color: #dc3545;
        }

        .pin-button.animate {
            animation: heartBeat 0.6s ease;
        }

        .pin-button.pinned:hover {
            color: #c82333;
            transform: scale(1.1);
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
            50% {
                transform: scale(1);
            }
            75% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .pin-button:active {
            transform: scale(0.9);
        }

        .stats {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease;
        }

        .stats h2 {
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .stats-count {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
        }


        .search-bar {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1em;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            outline: none;
            direction: rtl;
            text-align: right;
            transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease;
        }

        .search-bar input:focus {
            border-color: var(--border-color-focus);
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        .uv-table {
            margin-top: 15px;
            border-collapse: collapse;
            font-size: 0.9em;
            min-width: 100%;
            width: max-content;
        }

        .uv-table th,
        .uv-table td {
            padding: 10px;
            text-align: center;
            border: none;
            white-space: nowrap;
            direction: ltr;
        }

        .uv-table th {
            background: var(--bg-primary);
            font-weight: 600;
            color: var(--text-secondary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .uv-table td {
            background: var(--bg-secondary);
            transition: background-color 0.3s ease;
        }

        .uv-value {
            font-weight: 600;
            border-radius: 4px;
            padding: 6px 12px;
            display: inline-block;
            min-width: 36px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .dark .uv-value {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .uv-0 {
            background: #86efac;
            color: #14532d;
        }

        .uv-1 {
            background: #4ade80;
            color: #064e20;
        }

        .uv-2 {
            background: #fef08a;
            color: #713f12;
        }

        .uv-3 {
            background: #fbbf24;
            color: #78350f;
        }

        .uv-4 {
            background: #fb923c;
            color: #7c2d12;
        }

        .uv-5 {
            background: #f97316;
            color: #ffffff;
        }

        .uv-6 {
            background: #fb7185;
            color: #7f1d1d;
        }

        .uv-7 {
            background: #f43f5e;
            color: #ffffff;
        }

        .uv-8 {
            background: #ef4444;
            color: #ffffff;
        }

        .uv-9 {
            background: #dc2626;
            color: #ffffff;
        }

        .uv-10 {
            background: #c084fc;
            color: #ffffff;
        }

        .uv-11 {
            background: #7c3aed;
            color: #ffffff;
        }

        .uv-12 {
            background: #1e1b4b;
            color: #ffffff;
            box-shadow: 0 0 8px rgba(124, 58, 237, 0.6);
        }

        .uv-section {
            margin-top: 10px;
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
        }

        .uv-section::-webkit-scrollbar {
            height: 8px;
        }

        .uv-section::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 4px;
        }

        .uv-section::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .uv-section::-webkit-scrollbar-thumb:hover {
            background: var(--border-color-hover);
        }

        .no-uv-data {
            color: var(--text-tertiary);
            font-style: italic;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="position: relative;">
                <button id="date-icon-button" class="date-icon-button" style="display: none;" title="בחר תאריך">
                    📅
                </button>
                <div id="date-dropdown" class="date-dropdown">
                    <select id="date-select"></select>
                </div>
            </div>
            <h1>UV Index</h1>
            <div style="position: relative;">
                <button id="dark-mode-toggle" class="dark-mode-toggle" title="Toggle dark mode">
                    🌙
                </button>
            </div>
        </div>
        
        <div id="loading" class="loading">
            ...טוען מיקומים
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="search-bar" class="search-bar" style="display: none;">
            <input type="text" id="search-input" placeholder="חפש מיקומים...">
        </div>

        <div id="locations" class="locations-grid"></div>
    </div>

    <script>
        let locationsData = {};
        let uvData = {};
        let availableDates = [];
        let searchQuery = '';
        
        // Calculate time-based hue overlay
        function getTimeBasedHue() {
            const now = new Date();
            const hour = now.getHours();
            const isDark = document.documentElement.classList.contains('dark');
            
            let hue, saturation, lightness, alpha;
            
            // 0-6: Deep night (cool blue)
            if (hour >= 0 && hour < 6) {
                hue = 220;
                saturation = isDark ? 25 : 12;
                lightness = isDark ? 15 : 10;
                alpha = isDark ? 0.5 : 0.25;
            }
            // 6-9: Sunrise (warm orange/yellow)
            else if (hour >= 6 && hour < 9) {
                hue = 35;
                saturation = isDark ? 30 : 15;
                lightness = isDark ? 20 : 12;
                alpha = isDark ? 0.6 : 0.3;
            }
            // 9-12: Morning (bright yellow)
            else if (hour >= 9 && hour < 12) {
                hue = 50;
                saturation = isDark ? 25 : 12;
                lightness = isDark ? 25 : 10;
                alpha = isDark ? 0.5 : 0.25;
            }
            // 12-15: Peak day (neutral, slight warm)
            else if (hour >= 12 && hour < 15) {
                hue = 10;
                saturation = isDark ? 20 : 8;
                lightness = isDark ? 15 : 5;
                alpha = isDark ? 0.4 : 0.15;
            }
            // 15-18: Afternoon (warm)
            else if (hour >= 15 && hour < 18) {
                hue = 25;
                saturation = isDark ? 25 : 12;
                lightness = isDark ? 20 : 10;
                alpha = isDark ? 0.5 : 0.25;
            }
            // 18-21: Evening/sunset (warm orange/pink)
            else if (hour >= 18 && hour < 21) {
                hue = 15;
                saturation = isDark ? 35 : 18;
                lightness = isDark ? 20 : 12;
                alpha = isDark ? 0.6 : 0.3;
            }
            // 21-24: Night (cool blue)
            else {
                hue = 230;
                saturation = isDark ? 28 : 12;
                lightness = isDark ? 18 : 10;
                alpha = isDark ? 0.55 : 0.25;
            }
            
            return `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
        }
        
        // Calculate time-based header glow (for gradient background)
        function getTimeBasedGlow() {
            const now = new Date();
            const hour = now.getHours();
            const isDark = document.documentElement.classList.contains('dark');
            
            let hue, saturation, lightness, alpha;
            
            // 0-6: Deep night (cool blue glow)
            if (hour >= 0 && hour < 6) {
                hue = 220;
                saturation = isDark ? 40 : 30;
                lightness = isDark ? 25 : 35;
                alpha = isDark ? 0.6 : 0.4;
            }
            // 6-9: Sunrise (warm orange/yellow glow)
            else if (hour >= 6 && hour < 9) {
                hue = 35;
                saturation = isDark ? 50 : 40;
                lightness = isDark ? 30 : 40;
                alpha = isDark ? 0.7 : 0.5;
            }
            // 9-12: Morning (bright yellow glow)
            else if (hour >= 9 && hour < 12) {
                hue = 50;
                saturation = isDark ? 45 : 35;
                lightness = isDark ? 35 : 45;
                alpha = isDark ? 0.65 : 0.45;
            }
            // 12-15: Peak day (neutral, slight warm glow)
            else if (hour >= 12 && hour < 15) {
                hue = 10;
                saturation = isDark ? 35 : 25;
                lightness = isDark ? 30 : 40;
                alpha = isDark ? 0.5 : 0.3;
            }
            // 15-18: Afternoon (warm glow)
            else if (hour >= 15 && hour < 18) {
                hue = 25;
                saturation = isDark ? 45 : 35;
                lightness = isDark ? 32 : 42;
                alpha = isDark ? 0.6 : 0.4;
            }
            // 18-21: Evening/sunset (warm orange/pink glow)
            else if (hour >= 18 && hour < 21) {
                hue = 15;
                saturation = isDark ? 55 : 45;
                lightness = isDark ? 30 : 40;
                alpha = isDark ? 0.7 : 0.5;
            }
            // 21-24: Night (cool blue glow)
            else {
                hue = 230;
                saturation = isDark ? 45 : 35;
                lightness = isDark ? 28 : 38;
                alpha = isDark ? 0.65 : 0.45;
            }
            
            return `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
        }
        
        // Apply time-based hue
        function applyTimeBasedHue() {
            const hue = getTimeBasedHue();
            const glow = getTimeBasedGlow();
            document.documentElement.style.setProperty('--time-hue-overlay', hue);
            document.documentElement.style.setProperty('--header-glow', glow);
        }
        
        // Dark mode functionality
        function initDarkMode() {
            const darkModeToggle = document.getElementById('dark-mode-toggle');
            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            
            // Set initial state
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                darkModeToggle.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                darkModeToggle.textContent = '🌙';
            }
            
            // Apply time-based hue
            applyTimeBasedHue();
            
            // Toggle dark mode on button click
            darkModeToggle.addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('darkMode', isDark);
                darkModeToggle.textContent = isDark ? '🌙' : '☀️';
                // Update hue when toggling dark mode
                applyTimeBasedHue();
            });
            
            // Update hue every hour
            setInterval(applyTimeBasedHue, 60 * 60 * 1000);
        }
        
        // Fuzzy search function
        function fuzzyMatch(pattern, text) {
            pattern = pattern.toLowerCase();
            text = text.toLowerCase();
            
            // Exact match (highest priority)
            if (text === pattern) return 1000;
            
            // Starts with pattern (high priority)
            if (text.startsWith(pattern)) return 500;
            
            // Contains pattern as substring (medium priority)
            if (text.includes(pattern)) return 200;
            
            // Fuzzy match: check if all characters in pattern appear in order
            let patternIndex = 0;
            let consecutiveMatches = 0;
            let maxConsecutive = 0;
            
            for (let i = 0; i < text.length && patternIndex < pattern.length; i++) {
                if (text[i] === pattern[patternIndex]) {
                    consecutiveMatches++;
                    maxConsecutive = Math.max(maxConsecutive, consecutiveMatches);
                    patternIndex++;
                } else {
                    consecutiveMatches = 0;
                }
            }
            
            // If all pattern characters found in order
            if (patternIndex === pattern.length) {
                // Score based on how close together the matches are
                return 50 + (maxConsecutive * 10);
            }
            
            // Character similarity: count how many pattern chars appear in text
            let matchedChars = 0;
            const textChars = new Set(text);
            for (let char of pattern) {
                if (textChars.has(char)) {
                    matchedChars++;
                }
            }
            
            // If most characters match, give it a low score
            if (matchedChars >= Math.ceil(pattern.length * 0.6)) {
                return 10 + matchedChars;
            }
            
            return 0;
        }
        
        // Load pinned locations from localStorage
        function getPinnedLocations() {
            const pinned = localStorage.getItem('pinnedLocations');
            return pinned ? JSON.parse(pinned) : [];
        }
        
        // Save pinned locations to localStorage
        function savePinnedLocations(pinned) {
            localStorage.setItem('pinnedLocations', JSON.stringify(pinned));
        }
        
        // Toggle pin status of a location
        function togglePin(locationId, event) {
            // Add animation to the clicked button
            if (event && event.target) {
                const btn = event.target.closest('.pin-button');
                if (btn) {
                    btn.classList.add('animate');
                    setTimeout(() => {
                        btn.classList.remove('animate');
                    }, 600);
                }
            }
            
            let pinned = getPinnedLocations();
            const index = pinned.indexOf(locationId);
            if (index > -1) {
                pinned.splice(index, 1);
            } else {
                pinned.push(locationId);
            }
            savePinnedLocations(pinned);
            // Refresh display
            const dateSelectEl = document.getElementById('date-select');
            displayLocations(dateSelectEl.value);
        }

        function getUVClass(value) {
            const uv = parseInt(value) || 0;
            if (uv === 0) return 'uv-0';
            if (uv === 1) return 'uv-1';
            if (uv === 2) return 'uv-2';
            if (uv === 3) return 'uv-3';
            if (uv === 4) return 'uv-4';
            if (uv === 5) return 'uv-5';
            if (uv === 6) return 'uv-6';
            if (uv === 7) return 'uv-7';
            if (uv === 8) return 'uv-8';
            if (uv === 9) return 'uv-9';
            if (uv === 10) return 'uv-10';
            if (uv === 11) return 'uv-11';
            return 'uv-12';
        }

        function getUVLevel(value) {
            const uv = parseInt(value) || 0;
            if (uv <= 2) return 'Low';
            if (uv <= 5) return 'Moderate';
            if (uv <= 7) return 'High';
            if (uv <= 10) return 'Very High';
            return 'Extreme';
        }

        async function fetchData() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const locationsEl = document.getElementById('locations');
            const dateIconButton = document.getElementById('date-icon-button');
            const dateDropdown = document.getElementById('date-dropdown');
            const dateSelectEl = document.getElementById('date-select');

            try {
                // Fetch the pre-generated data snapshot. This JSON is produced
                // daily by a GitHub Actions workflow (scripts/fetch-uv-data.js)
                // and committed to the repo, so no live backend is needed.
                const dataResponse = await fetch(`data/uv-index.json?t=${Date.now()}`);

                if (!dataResponse.ok) {
                    throw new Error(`HTTP error! status: ${dataResponse.status}`);
                }

                const dataResult = await dataResponse.json();

                // Hide loading
                loadingEl.style.display = 'none';
                errorEl.style.display = 'none';

                // Check if data exists
                if (!dataResult.locations) {
                    throw new Error('No locations data received');
                }
                if (!dataResult.uv) {
                    throw new Error('No UV data received');
                }

                // Store data
                locationsData = dataResult.locations;
                uvData = dataResult.uv;

                // Extract available dates from UV data
                const datesSet = new Set();
                Object.values(uvData).forEach(locationData => {
                    Object.keys(locationData).forEach(date => {
                        datesSet.add(date);
                    });
                });
                availableDates = Array.from(datesSet).sort();

                // Populate date selector
                dateSelectEl.innerHTML = availableDates.map(date => {
                    const dateObj = new Date(date);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    dateObj.setHours(0, 0, 0, 0);
                    const isToday = dateObj.getTime() === today.getTime();
                    return `<option value="${date}" ${isToday ? 'selected' : ''}>${date}${isToday ? ' (היום)' : ''}</option>`;
                }).join('');

                if (availableDates.length > 0) {
                    dateIconButton.style.display = 'flex';
                    document.getElementById('search-bar').style.display = 'block';
                }

                // Display locations with UV data
                displayLocations(availableDates[0] || dateSelectEl.value);

                // Setup search functionality
                const searchInput = document.getElementById('search-input');
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase().trim();
                    displayLocations(dateSelectEl.value);
                });

                // Setup date icon button click
                dateIconButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dateDropdown.classList.toggle('show');
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.date-icon-button') && !e.target.closest('.date-dropdown')) {
                        dateDropdown.classList.remove('show');
                    }
                });

                // Update display when date changes
                dateSelectEl.addEventListener('change', (e) => {
                    displayLocations(e.target.value);
                    dateDropdown.classList.remove('show');
                });

            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = `שגיאה בטעינת נתונים: ${error.message}`;
                console.error('Error fetching data:', error);
            }
        }

        function displayLocations(selectedDate) {
            const locationsEl = document.getElementById('locations');
            const pinned = getPinnedLocations();
            let locations = Object.values(locationsData);
            
            // Filter locations based on search query with fuzzy matching
            if (searchQuery) {
                const scoredLocations = locations.map(location => ({
                    location: location,
                    score: fuzzyMatch(searchQuery, location.name),
                    pinned: pinned.includes(location.lid)
                })).filter(item => item.score > 0)
                  .sort((a, b) => {
                      // Prioritize pinned locations
                      if (a.pinned && !b.pinned) return -1;
                      if (!a.pinned && b.pinned) return 1;
                      // Then sort by fuzzy match score
                      if (b.score !== a.score) return b.score - a.score;
                      // Finally alphabetically
                      return a.location.name.localeCompare(b.location.name);
                  });
                
                locations = scoredLocations.map(item => item.location);
            } else {
                // Sort: pinned first, then alphabetically (when no search)
                locations.sort((a, b) => {
                    const aPinned = pinned.includes(a.lid);
                    const bPinned = pinned.includes(b.lid);
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    return a.name.localeCompare(b.name);
                });
            }

            locationsEl.innerHTML = locations.map(location => {
                // Get UV data for this location and date
                const locationUV = uvData[location.lid];
                const dateUV = locationUV && locationUV[selectedDate] ? locationUV[selectedDate] : null;

                // Generate hourly UV table
                let uvTableHTML = '';
                if (dateUV) {
                    const hours = Object.keys(dateUV).sort((a, b) => parseInt(a) - parseInt(b));
                    uvTableHTML = `
                        <div class="uv-section">
                            <table class="uv-table">
                                <thead>
                                    <tr>
                                        ${hours.map(h => `<th>${h}:00</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        ${hours.map(h => {
                                            const value = dateUV[h];
                                            const uvClass = getUVClass(value);
                                            return `<td><span class="uv-value ${uvClass}" title="${getUVLevel(value)}">${value}</span></td>`;
                                        }).join('')}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    uvTableHTML = `<div class="no-uv-data">אין נתוני UV זמינים עבור ${selectedDate}</div>`;
                }

                const isPinned = pinned.includes(location.lid);
                return `
                    <div class="location-card">
                        <div class="location-name">
                            <span class="location-name-text">${location.name}</span>
                            <button class="pin-button ${isPinned ? 'pinned' : ''}" onclick="togglePin('${location.lid}', event)" title="${isPinned ? 'הסר סימון' : 'סימון'}">
                                ${isPinned ? '❤️' : '🤍'}
                            </button>
                        </div>
                        ${uvTableHTML}
                    </div>
                `;
            }).join('');
        }

        // Initialize dark mode and fetch data when page loads
        initDarkMode();
        fetchData();
    </script>
</body>
</html>
